<div class="login-page">
  <app-login-form-left></app-login-form-left>
  <!-- Right side - Login Form -->
  <div class="login-form-wrapper">
    <div class="login-form-container">
      <div class="form-header">
        <h2 class="form-title">Đăng nhập</h2>
        <p class="form-description">Vui lòng đăng nhập để tiếp tục sử dụng hệ thống</p>
      </div>

      @if (errorMessage()) {
        <div class="error-banner">
          <tui-icon icon="@tui.circle-alert" class="error-icon" />
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-field">
          <label tuiLabel class="field-label">
            <tui-icon icon="@tui.user" class="label-icon" />
            Tên đăng nhập
          </label>
          <tui-textfield iconStart="@tui.user" class="input-field">
            <input
              tuiTextfield
              formControlName="username"
              placeholder="Nhập tên đăng nhập hoặc email"
              autocomplete="username"
            />
          </tui-textfield>
        </div>

        <div class="form-field">
          <div class="label-with-action">
            <label tuiLabel class="field-label">
              <tui-icon icon="@tui.lock" class="label-icon" />
              Mật khẩu
            </label>
            <a routerLink="/forgot-password" class="forgot-password-link">
              <tui-icon icon="@tui.help-circle" />
              Quên mật khẩu?
            </a>
          </div>
          <tui-textfield iconStart="@tui.lock" class="input-field">
            <input
              tuiTextfield
              type="password"
              formControlName="password"
              placeholder="Nhập mật khẩu"
              autocomplete="current-password"
            />
            <tui-icon tuiPassword />
          </tui-textfield>
        </div>

        <div class="form-actions">
          <tui-loader [showLoader]="isLoading()" class="login-loader">
            <button
              tuiButton
              type="submit"
              appearance="primary"
              class="login-button"
              [disabled]="isLoading()"
            >
              <tui-icon icon="@tui.arrow-right" />
              Đăng nhập
            </button>
          </tui-loader>
        </div>
      </form>

      <div class="divider-container">
        <span class="divider-text">Hoặc</span>
      </div>

      <div class="signup-section">
        <p class="signup-text">
          Chưa có tài khoản?
          <a routerLink="/register" class="signup-link">
            <tui-icon icon="@tui.user-plus" />
            Đăng ký ngay
          </a>
        </p>
      </div>

      <div class="form-footer">
        <p>© 2026 iResource Hub. All rights reserved.</p>
      </div>
    </div>
  </div>
</div>
